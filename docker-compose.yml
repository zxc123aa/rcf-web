services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/pstar_data:/app/pstar_data
      - ./backend/data:/app/data
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - TASK_TTL_RUNNING_SEC=21600
      - TASK_TTL_DONE_SEC=3600
      - TASK_CLEANUP_INTERVAL_SEC=60
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M

  nginx:
    build: ./frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
